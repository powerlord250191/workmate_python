version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: spimex_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - spimex_network

  redis:
    image: redis:7-alpine
    container_name: spimex_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - spimex_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: spimex_rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spimex_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spimex_app
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - REDIS_URL=redis://redis:6379/0
      - RMQ_HOST=rabbitmq
      - RMQ_PORT=5672
      - RMQ_USER=${RMQ_USER:-guest}
      - RMQ_PASSWORD=${RMQ_PASSWORD:-guest}
      - MQ_ROUTING_KEY=trading_service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./app/logs:/app/app/logs
    networks:
      - spimex_network
    restart: unless-stopped

  migrations:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spimex_migrations
    command: python init_db.py
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - spimex_network
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  spimex_network:
    driver: bridge
services:
  postgres:
    image: postgres:15-alpine
    container_name: spimex_postgres
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spimex_network

  redis:
    image: redis:7-alpine
    container_name: spimex_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spimex_network

  app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: spimex_app
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./app/config.env:/app/app/config.env
      - ./app/logs:/app/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - spimex_network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.12-management
    hostname: rabbitmq
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASSWORD: "guest"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  migrations:
    build:
      context: .
      dockerfile: dockerfile
    container_name: spimex_migrations
    command: python init_db.py
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
    volumes:
      - ./app/config.env:/app/app/config.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - spimex_network
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  rabbitmq-data:

networks:
  spimex_network:
    driver: bridge